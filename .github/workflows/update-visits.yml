name: Update Roblox visits

on:
  schedule:
    # Every hour at minute :00 (UTC)
    - cron: '0 * * * *'
  workflow_dispatch: # allow manual run from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch live Roblox visit counts
        run: node scripts/fetch-visits.js

      - name: Commit if visits changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Drop the updatedAt timestamp from diff check — only commit if
          # actual visit numbers changed, not just the timestamp ticking.
          if git diff --quiet -I '"updatedAt"' assets/visits.json; then
            echo "No visit count changes — skipping commit."
            exit 0
          fi

          git add assets/visits.json
          git commit -m "chore: update Roblox visits [skip ci]"
          git push
